# prefix key
unbind C-b
set -g prefix C-Space

# reload tmux
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# term config
set -s extended-keys on
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm*:extkeys'
set -as terminal-features ',tmux*:extkeys'
set -as terminal-overrides ',xterm*:Tc'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colors - needs tmux-3.0
# set -sg escape-time 10

# bar position at top
set-option -g status-position top

# allow mouse
set -g mouse on

# Setup clipboard
set-option -s set-clipboard on
set -g allow-passthrough on

# selection with prefix + [
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# resize panes
bind-key -r -T prefix K resize-pane -U 2
bind-key -r -T prefix J resize-pane -D 2
bind-key -r -T prefix H resize-pane -L 2
bind-key -r -T prefix L resize-pane -R 2

# start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows off

# kill session
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'laishulu/emacs-tmux-pane'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Configs
set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_window_status_style "custom"
# Inactive window tabs
set -g @catppuccin_window_left_separator "#[bg=default,fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_bg}]"
set -g @catppuccin_window_right_separator "#[bg=default,fg=#{@thm_surface_0}]"
# Active window tabs
set -g @catppuccin_window_current_left_separator "#[bg=default,fg=#{@thm_surface_1}]#[bg=#{@thm_surface_1},fg=#{@thm_mauve}]"
set -g @catppuccin_window_current_right_separator "#[bg=default,fg=#{@thm_surface_1}]"
set -g @catppuccin_status_background "none"  # Leaves the background transparent

# set -g status-bg default
set -g @catppuccin_flavor 'macchiato' # or frappe, latte, mocha
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# set -g status-right "#{E:@catppuccin_status_directory}"
set -g status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"
run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'


is_editor="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|emacsclient|emacs|doom)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_editor" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_editor" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_editor" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_editor" 'send-keys C-l'  'select-pane -R'

# Allow C-l to still clear the screen by pressing Prefix + C-l
bind C-l send-keys 'C-l'

bind-key / display-popup -w 80% -h 80% -E "tmux list-keys | fzf --reverse"

run '~/.config/tmux/plugins/tpm/tpm'
